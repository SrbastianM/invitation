# Despliega la app Next (carpeta `invitation/`) a GitHub Pages.
#
# Requisitos en el repo (GitHub → Settings → Pages):
#   - Source: GitHub Actions
#
# Opcional: Settings → Secrets → Actions, para EmailJS en el build:
#   NEXT_PUBLIC_EMAILJS_SERVICE_ID, NEXT_PUBLIC_EMAILJS_TEMPLATE_ADMIN,
#   NEXT_PUBLIC_EMAILJS_TEMPLATE_GUEST, NEXT_PUBLIC_EMAILJS_PUBLIC_KEY,
#   NEXT_PUBLIC_ADMIN_EMAIL
#
# URL del sitio (proyecto): https://<usuario>.github.io/<nombre-repo>/

name: Deploy GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: invitation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: invitation/package-lock.json

      - name: Install and build (static export)
        env:
          BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ADMIN: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_ADMIN }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_GUEST: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_GUEST }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
          NEXT_PUBLIC_ADMIN_EMAIL: ${{ secrets.NEXT_PUBLIC_ADMIN_EMAIL }}
        run: |
          npm ci
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: invitation/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
